<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>25分 スマホ封印タイマーABC</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono:wght@700&display=swap');
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    
    .timer-font {
      font-family: 'Space Mono', monospace;
      letter-spacing: -0.03em;
    }

    /* SVG Progress Ring Transition */
    .progress-ring__circle {
      transition: stroke-dashoffset 0.35s ease-in-out;
      transform: rotate(-90deg);
      transform-origin: 50% 50%;
    }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col justify-between selection:bg-teal-500/30 selection:text-teal-200">

  <!-- Header -->
  <header class="p-4 sm:p-6 border-b border-slate-800/80 flex justify-between items-center max-w-4xl w-full mx-auto">
    <div class="flex items-center gap-3">
      <div class="p-2.5 bg-teal-500/10 border border-teal-500/20 rounded-2xl text-teal-400">
        <i data-lucide="shield-check" class="w-5 h-5"></i>
      </div>
      <div>
        <h1 class="font-bold text-base sm:text-lg tracking-tight text-slate-100">スマホ封印タイマー</h1>
        <p class="text-xs text-slate-400">画面を開いたまま集中を守りましょう</p>
      </div>
    </div>
    
    <div class="flex items-center gap-2.5">
      <button id="stats-btn" title="実績" class="p-2.5 rounded-xl bg-slate-800/80 border border-slate-700/60 text-slate-300 hover:text-white hover:bg-slate-700/80 transition">
        <i data-lucide="bar-chart-2" class="w-4 h-4"></i>
      </button>
      <button id="sound-toggle-btn" title="環境音" class="p-2.5 rounded-xl bg-slate-800/80 border border-slate-700/60 text-slate-300 hover:text-white hover:bg-slate-700/80 transition relative">
        <i id="sound-icon" data-lucide="volume-x" class="w-4 h-4"></i>
      </button>
    </div>
  </header>

  <!-- Main Container -->
  <main class="flex-1 flex flex-col items-center justify-center p-4 max-w-md w-full mx-auto">

    <!-- Mode Selector -->
    <div class="bg-slate-950/60 p-1.5 rounded-2xl border border-slate-800 flex gap-1.5 mb-8 w-full shadow-inner">
      <button id="mode-focus" class="flex-1 py-2.5 px-4 rounded-xl text-xs sm:text-sm font-semibold transition bg-teal-600 text-slate-950 shadow-md shadow-teal-900/30">
        集中 (25分)
      </button>
      <button id="mode-break" class="flex-1 py-2.5 px-4 rounded-xl text-xs sm:text-sm font-medium text-slate-400 hover:text-slate-200 transition">
        休憩 (5分)
      </button>
    </div>

    <!-- Timer Display with Circular Progress -->
    <div class="relative w-72 h-72 sm:w-80 sm:h-80 flex items-center justify-center my-2">
      <svg class="w-full h-full drop-shadow-lg" viewBox="0 0 100 100">
        <!-- Background Track -->
        <circle
          class="text-slate-800"
          stroke-width="5"
          stroke="currentColor"
          fill="transparent"
          r="42"
          cx="50"
          cy="50"
        />
        <!-- Progress Circle -->
        <circle
          id="progress-ring"
          class="progress-ring__circle text-teal-400"
          stroke-width="5"
          stroke-dasharray="263.89"
          stroke-dashoffset="0"
          stroke-linecap="round"
          stroke="currentColor"
          fill="transparent"
          r="42"
          cx="50"
          cy="50"
        />
      </svg>

      <!-- Center Content -->
      <div class="absolute inset-0 flex flex-col items-center justify-center text-center">
        <span id="timer-display" class="timer-font text-5xl sm:text-6xl font-bold text-slate-100">
          25:00
        </span>
        <span id="timer-status" class="text-xs font-medium text-slate-400 mt-3 flex items-center gap-2 bg-slate-800/80 px-3 py-1 rounded-full border border-slate-700/50">
          <span class="w-2 h-2 rounded-full bg-teal-400 animate-pulse"></span>
          準備完了
        </span>
      </div>
    </div>

    <!-- Phone Lock Reminder -->
    <div class="mt-6 mb-8 bg-slate-800/40 border border-slate-700/50 rounded-2xl p-3.5 text-center text-xs text-slate-400 flex items-center justify-center gap-2.5 w-full backdrop-blur-sm">
      <i data-lucide="smartphone-charging" class="w-4 h-4 text-teal-400 shrink-0"></i>
      <span>タイマー開始後は画面を閉じたり切り替えないでください</span>
    </div>

    <!-- Timer Controls -->
    <div class="flex items-center justify-center gap-3 w-full">
      <button id="reset-btn" title="リセット" class="p-4 rounded-2xl bg-slate-800/80 border border-slate-700/60 text-slate-400 hover:text-slate-200 hover:bg-slate-700/80 transition active:scale-95">
        <i data-lucide="rotate-ccw" class="w-5 h-5"></i>
      </button>

      <button id="start-btn" class="flex-1 py-4 px-8 rounded-2xl bg-teal-500 hover:bg-teal-400 text-slate-950 font-bold text-base transition shadow-lg shadow-teal-950/50 active:scale-95 flex items-center justify-center gap-2">
        <i id="start-icon" data-lucide="play" class="w-5 h-5 fill-current"></i>
        <span id="start-btn-text">スタート</span>
      </button>
    </div>

    <!-- Sound Selection Menu (Hidden by default) -->
    <div id="sound-menu" class="hidden mt-5 bg-slate-800/90 border border-slate-700/80 p-4 rounded-2xl w-full shadow-xl">
      <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">集中BGM (環境音)</h3>
      <div class="grid grid-cols-3 gap-2">
        <button data-sound="off" class="sound-option py-2 px-2.5 rounded-xl border border-slate-600 bg-slate-700 text-xs font-medium text-white transition">オフ</button>
        <button data-sound="white" class="sound-option py-2 px-2.5 rounded-xl border border-slate-700/80 text-xs font-medium text-slate-400 hover:border-slate-600 transition">ホワイトノイズ</button>
        <button data-sound="rain" class="sound-option py-2 px-2.5 rounded-xl border border-slate-700/80 text-xs font-medium text-slate-400 hover:border-slate-600 transition">雨の音</button>
        <button data-sound="waves" class="sound-option py-2 px-2.5 rounded-xl border border-slate-700/80 text-xs font-medium text-slate-400 hover:border-slate-600 transition">波の音</button>
        <button data-sound="fire" class="sound-option py-2 px-2.5 rounded-xl border border-slate-700/80 text-xs font-medium text-slate-400 hover:border-slate-600 transition">たき火</button>
        <button data-sound="cafe" class="sound-option py-2 px-2.5 rounded-xl border border-slate-700/80 text-xs font-medium text-slate-400 hover:border-slate-600 transition">カフェ</button>
      </div>
    </div>

  </main>

  <!-- App Left Alert Overlay Modal -->
  <div id="alert-modal" class="fixed inset-0 bg-slate-950/85 backdrop-blur-md flex items-center justify-center p-4 z-50 opacity-0 pointer-events-none transition-opacity duration-300">
    <div class="bg-slate-900 border border-rose-500/30 p-6 rounded-3xl max-w-sm w-full text-center shadow-2xl">
      <div class="w-14 h-14 bg-rose-500/10 text-rose-400 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-rose-500/20">
        <i data-lucide="alert-triangle" class="w-7 h-7"></i>
      </div>
      <h2 class="text-lg font-bold text-slate-100 mb-2">画面の切り替えを検知しました</h2>
      <p class="text-xs sm:text-sm text-slate-300 mb-6 leading-relaxed">
        スマホの操作を検知したため一時停止しました。画面に戻り、再び集中をはじめましょう！
      </p>
      <button id="modal-resume-btn" class="w-full py-3.5 bg-rose-500 hover:bg-rose-400 text-white font-bold text-sm rounded-xl transition shadow-lg shadow-rose-950/50">
        集中を再開する
      </button>
    </div>
  </div>

  <!-- Stats Modal -->
  <div id="stats-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4 z-50 opacity-0 pointer-events-none transition-opacity duration-300">
    <div class="bg-slate-900 border border-slate-800 p-6 rounded-3xl max-w-sm w-full shadow-2xl">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-base font-bold text-slate-100 flex items-center gap-2">
          <i data-lucide="award" class="w-5 h-5 text-teal-400"></i>
          本日の集中記録
        </h2>
        <button id="close-stats-btn" class="text-slate-400 hover:text-slate-200 p-1">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>

      <div class="space-y-3 mb-6">
        <div class="bg-slate-950/60 p-4 rounded-2xl border border-slate-800/80 flex justify-between items-center">
          <span class="text-xs text-slate-400">完了したセッション</span>
          <span id="stat-sessions" class="text-xl font-bold text-teal-400">0 回</span>
        </div>
        <div class="bg-slate-950/60 p-4 rounded-2xl border border-slate-800/80 flex justify-between items-center">
          <span class="text-xs text-slate-400">総集中時間</span>
          <span id="stat-time" class="text-xl font-bold text-teal-400">0 分</span>
        </div>
      </div>

      <p class="text-xs text-center text-slate-500">毎日の小さな積み重ねが大きな成果につながります。</p>
    </div>
  </div>

  <script>
    // Lucide Icons Render
    lucide.createIcons();

    // App State Variables
    const FOCUS_TIME = 25 * 60; // 25 minutes
    const BREAK_TIME = 5 * 60;   // 5 minutes
    
    let currentMode = 'focus'; // 'focus' | 'break'
    let totalSeconds = FOCUS_TIME;
    let secondsLeft = FOCUS_TIME;
    let timerInterval = null;
    let isRunning = false;

    // Statistics (Stored in localStorage)
    let completedSessions = parseInt(localStorage.getItem('focus_completed_sessions') || '0');
    let totalFocusedMinutes = parseInt(localStorage.getItem('focus_total_minutes') || '0');

    // DOM Elements
    const timerDisplay = document.getElementById('timer-display');
    const timerStatus = document.getElementById('timer-status');
    const progressRing = document.getElementById('progress-ring');
    const startBtn = document.getElementById('start-btn');
    const startIcon = document.getElementById('start-icon');
    const startBtnText = document.getElementById('start-btn-text');
    const resetBtn = document.getElementById('reset-btn');
    const modeFocusBtn = document.getElementById('mode-focus');
    const modeBreakBtn = document.getElementById('mode-break');
    const alertModal = document.getElementById('alert-modal');
    const modalResumeBtn = document.getElementById('modal-resume-btn');
    const statsBtn = document.getElementById('stats-btn');
    const statsModal = document.getElementById('stats-modal');
    const closeStatsBtn = document.getElementById('close-stats-btn');
    const statSessions = document.getElementById('stat-sessions');
    const statTime = document.getElementById('stat-time');
    const soundToggleBtn = document.getElementById('sound-toggle-btn');
    const soundMenu = document.getElementById('sound-menu');
    const soundIcon = document.getElementById('sound-icon');
    const soundOptions = document.querySelectorAll('.sound-option');

    // Progress Ring Calculation
    const radius = progressRing.r.baseVal.value;
    const circumference = 2 * Math.PI * radius;
    progressRing.style.strokeDasharray = `${circumference} ${circumference}`;

    function setProgress(percent) {
      const offset = circumference - (percent / 100) * circumference;
      progressRing.style.strokeDashoffset = offset;
    }

    // Audio Synthesizer (Web Audio API)
    let audioCtx = null;
    let ambientNoiseNodes = [];
    let currentSoundType = 'off';

    function initAudioContext() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
    }

    // Play Soft Chime Sound on Completion
    function playCompletionSound() {
      initAudioContext();
      if (!audioCtx) return;

      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = 'sine';
      osc.frequency.setValueAtTime(523.25, now); // C5
      osc.frequency.setValueAtTime(659.25, now + 0.15); // E5
      osc.frequency.setValueAtTime(783.99, now + 0.3); // G5
      osc.frequency.setValueAtTime(1046.50, now + 0.45); // C6

      gain.gain.setValueAtTime(0.08, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 1.2);

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start(now);
      osc.stop(now + 1.2);
    }

    // Clear ambient sound generators
    function stopAmbientSound() {
      ambientNoiseNodes.forEach(node => {
        try { node.disconnect(); } catch (e) {}
      });
      ambientNoiseNodes = [];
    }

    // Expanded Ambient Sound Generators using Web Audio API
    function setAmbientSound(type) {
      currentSoundType = type;
      stopAmbientSound();

      if (type === 'off') {
        soundIcon.setAttribute('data-lucide', 'volume-x');
        lucide.createIcons();
        return;
      }

      initAudioContext();
      soundIcon.setAttribute('data-lucide', 'volume-2');
      lucide.createIcons();

      const sampleRate = audioCtx.sampleRate;
      const bufferSize = sampleRate * 3;

      if (type === 'white') {
        const buffer = audioCtx.createBuffer(1, bufferSize, sampleRate);
        const output = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;

        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;
        noise.loop = true;

        const filter = audioCtx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.value = 1000;

        const gain = audioCtx.createGain();
        gain.gain.value = 0.025;

        noise.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);
        noise.start();
        ambientNoiseNodes.push(gain);

      } else if (type === 'rain') {
        const buffer = audioCtx.createBuffer(1, bufferSize, sampleRate);
        const output = buffer.getChannelData(0);
        let lastOut = 0.0;
        for (let i = 0; i < bufferSize; i++) {
          let white = Math.random() * 2 - 1;
          output[i] = (lastOut + (0.02 * white)) / 1.02;
          lastOut = output[i];
          output[i] *= 3.5;
        }

        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;
        noise.loop = true;

        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 800;

        const gain = audioCtx.createGain();
        gain.gain.value = 0.03;

        noise.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);
        noise.start();
        ambientNoiseNodes.push(gain);

      } else if (type === 'waves') {
        const buffer = audioCtx.createBuffer(1, bufferSize, sampleRate);
        const output = buffer.getChannelData(0);
        let lastOut = 0.0;
        for (let i = 0; i < bufferSize; i++) {
          let white = Math.random() * 2 - 1;
          output[i] = (lastOut + (0.02 * white)) / 1.02;
          lastOut = output[i];
          output[i] *= 3.0;
        }

        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;
        noise.loop = true;

        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';

        const lfo = audioCtx.createOscillator();
        lfo.frequency.value = 0.12;
        const lfoGain = audioCtx.createGain();
        lfoGain.gain.value = 350;

        lfo.connect(lfoGain);
        lfoGain.connect(filter.frequency);
        filter.frequency.value = 450;

        const gain = audioCtx.createGain();
        gain.gain.value = 0.035;

        noise.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);

        lfo.start();
        noise.start();
        ambientNoiseNodes.push(gain);

      } else if (type === 'fire') {
        const buffer = audioCtx.createBuffer(1, bufferSize, sampleRate);
        const output = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          const isCrackle = Math.random() < 0.0015;
          output[i] = isCrackle ? (Math.random() * 2 - 1) * 2.5 : (Math.random() * 0.08 - 0.04);
        }

        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;
        noise.loop = true;

        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 1200;

        const gain = audioCtx.createGain();
        gain.gain.value = 0.03;

        noise.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);
        noise.start();
        ambientNoiseNodes.push(gain);

      } else if (type === 'cafe') {
        const buffer = audioCtx.createBuffer(1, bufferSize, sampleRate);
        const output = buffer.getChannelData(0);
        let b0 = 0, b1 = 0, b2 = 0;
        for (let i = 0; i < bufferSize; i++) {
          let white = Math.random() * 2 - 1;
          b0 = 0.99886 * b0 + white * 0.0555179;
          b1 = 0.99332 * b1 + white * 0.0750759;
          b2 = 0.96900 * b2 + white * 0.1538520;
          output[i] = b0 + b1 + b2;
        }

        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;
        noise.loop = true;

        const filter = audioCtx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.value = 600;
        filter.Q.value = 0.8;

        const gain = audioCtx.createGain();
        gain.gain.value = 0.02;

        noise.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);
        noise.start();
        ambientNoiseNodes.push(gain);
      }
    }

    // Update Display Format
    function updateDisplay() {
      const mins = Math.floor(secondsLeft / 60);
      const secs = secondsLeft % 60;
      const formattedTime = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
      
      timerDisplay.textContent = formattedTime;
      document.title = isRunning ? `(${formattedTime}) 集中タイム - スマホ封印タイマー` : '25分 スマホ封印タイマー';

      const percent = ((totalSeconds - secondsLeft) / totalSeconds) * 100;
      setProgress(percent);
    }

    // Switch Timer Modes
    function setMode(mode) {
      if (isRunning) pauseTimer();
      currentMode = mode;

      if (mode === 'focus') {
        totalSeconds = FOCUS_TIME;
        secondsLeft = FOCUS_TIME;
        modeFocusBtn.className = "flex-1 py-2.5 px-4 rounded-xl text-xs sm:text-sm font-semibold transition bg-teal-500 text-slate-950 shadow-md shadow-teal-900/30";
        modeBreakBtn.className = "flex-1 py-2.5 px-4 rounded-xl text-xs sm:text-sm font-medium text-slate-400 hover:text-slate-200 transition";
        progressRing.classList.remove('text-indigo-400');
        progressRing.classList.add('text-teal-400');
        timerStatus.innerHTML = `<span class="w-2 h-2 rounded-full bg-teal-400 animate-pulse"></span> 準備完了`;
      } else {
        totalSeconds = BREAK_TIME;
        secondsLeft = BREAK_TIME;
        modeBreakBtn.className = "flex-1 py-2.5 px-4 rounded-xl text-xs sm:text-sm font-semibold transition bg-indigo-500 text-slate-950 shadow-md shadow-indigo-900/30";
        modeFocusBtn.className = "flex-1 py-2.5 px-4 rounded-xl text-xs sm:text-sm font-medium text-slate-400 hover:text-slate-200 transition";
        progressRing.classList.remove('text-teal-400');
        progressRing.classList.add('text-indigo-400');
        timerStatus.innerHTML = `<span class="w-2 h-2 rounded-full bg-indigo-400 animate-pulse"></span> 休憩中`;
      }

      updateDisplay();
    }

    // Timer Core Controls
    function startTimer() {
      if (isRunning) return;
      initAudioContext();
      
      isRunning = true;
      startBtnText.textContent = '一時停止';
      startIcon.setAttribute('data-lucide', 'pause');
      lucide.createIcons();

      startBtn.classList.remove('bg-teal-500', 'hover:bg-teal-400');
      startBtn.classList.add('bg-amber-500', 'hover:bg-amber-400');

      timerStatus.innerHTML = `<span class="w-2 h-2 rounded-full bg-teal-400 animate-ping"></span> カウントダウン中`;

      if (currentSoundType !== 'off') {
        setAmbientSound(currentSoundType);
      }

      timerInterval = setInterval(() => {
        if (secondsLeft > 0) {
          secondsLeft--;
          updateDisplay();
        } else {
          completeTimer();
        }
      }, 1000);
    }

    function pauseTimer() {
      if (!isRunning) return;
      isRunning = false;
      clearInterval(timerInterval);

      startBtnText.textContent = '再開';
      startIcon.setAttribute('data-lucide', 'play');
      lucide.createIcons();

      startBtn.classList.remove('bg-amber-500', 'hover:bg-amber-400');
      startBtn.classList.add('bg-teal-500', 'hover:bg-teal-400');

      timerStatus.innerHTML = `<span class="w-2 h-2 rounded-full bg-amber-400"></span> 一時停止中`;

      stopAmbientSound();
    }

    function resetTimer() {
      pauseTimer();
      secondsLeft = totalSeconds;
      startBtnText.textContent = 'スタート';
      setMode(currentMode);
    }

    function completeTimer() {
      pauseTimer();
      playCompletionSound();

      if (currentMode === 'focus') {
        completedSessions++;
        totalFocusedMinutes += 25;
        localStorage.setItem('focus_completed_sessions', completedSessions.toString());
        localStorage.setItem('focus_total_minutes', totalFocusedMinutes.toString());

        alert('🎉 25分間の集中タイムが終了しました！よく頑張りましたね。5分間しっかり休憩しましょう。');
        setMode('break');
      } else {
        alert('☕ 休憩時間が終了しました。次の25分も集中して取り組みましょう！');
        setMode('focus');
      }
    }

    // Tab Visibility Guard
    document.addEventListener('visibilitychange', () => {
      if (document.hidden && isRunning) {
        pauseTimer();
        showAlertModal();
      }
    });

    function showAlertModal() {
      alertModal.classList.remove('opacity-0', 'pointer-events-none');
    }

    function hideAlertModal() {
      alertModal.classList.add('opacity-0', 'pointer-events-none');
    }

    // Stats View Setup
    function updateStatsDisplay() {
      statSessions.textContent = `${completedSessions} 回`;
      statTime.textContent = `${totalFocusedMinutes} 分`;
    }

    // Event Listeners
    startBtn.addEventListener('click', () => {
      if (isRunning) {
        pauseTimer();
      } else {
        startTimer();
      }
    });

    resetBtn.addEventListener('click', resetTimer);

    modeFocusBtn.addEventListener('click', () => setMode('focus'));
    modeBreakBtn.addEventListener('click', () => setMode('break'));

    modalResumeBtn.addEventListener('click', () => {
      hideAlertModal();
      startTimer();
    });

    statsBtn.addEventListener('click', () => {
      updateStatsDisplay();
      statsModal.classList.remove('opacity-0', 'pointer-events-none');
    });

    closeStatsBtn.addEventListener('click', () => {
      statsModal.classList.add('opacity-0', 'pointer-events-none');
    });

    soundToggleBtn.addEventListener('click', () => {
      soundMenu.classList.toggle('hidden');
    });

    soundOptions.forEach(button => {
      button.addEventListener('click', (e) => {
        soundOptions.forEach(opt => {
          opt.classList.remove('border-slate-600', 'bg-slate-700', 'text-white');
          opt.classList.add('border-slate-700/80', 'text-slate-400');
        });

        const target = e.currentTarget;
        target.classList.remove('border-slate-700/80', 'text-slate-400');
        target.classList.add('border-slate-600', 'bg-slate-700', 'text-white');

        const soundType = target.getAttribute('data-sound');
        setAmbientSound(soundType);
      });
    });

    // Initial Setup
    updateDisplay();
  </script>
</body>
</html>
